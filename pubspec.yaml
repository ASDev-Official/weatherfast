name: weatherfast
description: "WeatherFast"

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 3.3.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  dynamic_color: ^1.8.1
  flutter_typeahead: ^6.0.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.1
  intl: ^0.20.2
  timezone: ^0.11.0
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.5.5
  home_widget: ^0.9.1
  workmanager: ^0.7.0
  flutter_dotenv: ^6.0.1
  mapbox_maps_flutter: ^2.23.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/profilepics/
    - assets/appicon/
    - .env
